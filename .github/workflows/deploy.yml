name: Deploy backend

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: scc-backend-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race ./...

      - name: Verify release tooling
        run: |
          bash -n scripts/*.sh
          bash scripts/test-deploy-hardening.sh
          bash scripts/test-doctor-vps.sh
          bash scripts/test-backup-recovery.sh
          bash scripts/test-minio-service-account-rotation.sh
          bash scripts/test-provision-vps-swap.sh

  build-and-push:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.immutable.outputs.image }}
      sha_image: ${{ steps.meta.outputs.sha_image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Compute image name
        id: meta
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "repository=${REGISTRY}/${repo}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${repo}:latest" >> "$GITHUB_OUTPUT"
          echo "sha_image=${REGISTRY}/${repo}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.sha_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Select immutable deployment image
        id: immutable
        env:
          IMAGE_REPOSITORY: ${{ steps.meta.outputs.repository }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [[ ! "$IMAGE_DIGEST" =~ ^sha256:[a-f0-9]{64}$ ]]; then
            echo "build did not return a valid sha256 image digest" >&2
            exit 1
          fi
          echo "image=${IMAGE_REPOSITORY}@${IMAGE_DIGEST}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Prepare SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/scc_deploy_key
          chmod 600 ~/.ssh/scc_deploy_key
          install -m 600 deploy/known_hosts ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          test -s ~/.ssh/known_hosts

      - name: Deploy immutable image on VPS
        env:
          GHCR_IMAGE: ${{ needs.build-and-push.outputs.image }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          SOURCE_COMMIT: ${{ github.sha }}
          FRONTEND_HEALTHCHECK_URL: ${{ vars.FRONTEND_HEALTHCHECK_URL }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          local_env="$(mktemp)"
          remote_dir=""
          ssh_target="${VPS_USER}@${VPS_HOST}"
          ssh_args=(
            -p "$VPS_PORT"
            -i ~/.ssh/scc_deploy_key
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )
          scp_args=(
            -P "$VPS_PORT"
            -i ~/.ssh/scc_deploy_key
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
          )

          cleanup() {
            rm -f "$local_env"
            if [[ -n "$remote_dir" ]]; then
              ssh "${ssh_args[@]}" "$ssh_target" "rm -rf -- '$remote_dir'" >/dev/null 2>&1 || true
            fi
          }
          trap cleanup EXIT

          env_quote() {
            printf '%s=' "$1"
            printf '%q' "$2"
            printf '\n'
          }

          {
            env_quote GHCR_IMAGE "$GHCR_IMAGE"
            env_quote GHCR_USERNAME "$GHCR_USERNAME"
            env_quote GHCR_TOKEN "$GHCR_TOKEN"
            env_quote RELEASE_ID "$RELEASE_ID"
            env_quote SOURCE_COMMIT "$SOURCE_COMMIT"
            env_quote FRONTEND_HEALTHCHECK_URL "$FRONTEND_HEALTHCHECK_URL"
          } > "$local_env"
          chmod 600 "$local_env"

          remote_dir="$(ssh "${ssh_args[@]}" "$ssh_target" 'umask 077; mktemp -d /tmp/scc-backend-deploy.XXXXXX')"
          if [[ ! "$remote_dir" =~ ^/tmp/scc-backend-deploy\.[A-Za-z0-9]+$ ]]; then
            echo "remote temporary directory is malformed" >&2
            remote_dir=""
            exit 1
          fi

          scp "${scp_args[@]}" scripts/deploy-vps.sh "$ssh_target:$remote_dir/deploy-vps.sh"
          scp "${scp_args[@]}" "$local_env" "$ssh_target:$remote_dir/deploy.env"
          ssh "${ssh_args[@]}" "$ssh_target" "bash -s -- '$remote_dir'" <<'REMOTE'
          set -euo pipefail
          remote_dir="$1"
          if [[ ! "$remote_dir" =~ ^/tmp/scc-backend-deploy\.[A-Za-z0-9]+$ ]]; then
            echo "remote temporary directory is malformed" >&2
            exit 1
          fi
          deploy_env="$remote_dir/deploy.env"
          deploy_script="$remote_dir/deploy-vps.sh"
          trap 'rm -rf -- "$remote_dir"' EXIT
          [[ -f "$deploy_env" && ! -L "$deploy_env" && -f "$deploy_script" && ! -L "$deploy_script" ]]
          chmod 600 "$deploy_env" "$deploy_script"
          set -a
          source "$deploy_env"
          set +a
          bash "$deploy_script"
          REMOTE
          remote_dir=""
