name: Deploy backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: scc-backend-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image name
        id: meta
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          echo "image=${REGISTRY}/${repo}:latest" >> "$GITHUB_OUTPUT"
          echo "sha_image=${REGISTRY}/${repo}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.sha_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/scc_deploy_key
          chmod 600 ~/.ssh/scc_deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT || 22 }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy script
        run: |
          scp -P "${{ secrets.VPS_PORT || 22 }}" -i ~/.ssh/scc_deploy_key scripts/deploy-vps.sh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/deploy-scc-backend.sh"

      - name: Deploy latest image on VPS
        env:
          GHCR_IMAGE: ${{ needs.build-and-push.outputs.image }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          local_env="$(mktemp)"
          trap 'rm -f "$local_env"' EXIT

          env_quote() {
            printf "%s='%s'\n" "$1" "$(printf '%s' "$2" | sed "s/'/'\\''/g")"
          }

          {
            env_quote GHCR_IMAGE "$GHCR_IMAGE"
            env_quote GHCR_USERNAME "$GHCR_USERNAME"
            env_quote GHCR_TOKEN "$GHCR_TOKEN"
          } > "$local_env"
          chmod 600 "$local_env"

          scp -P "${{ secrets.VPS_PORT || 22 }}" -i ~/.ssh/scc_deploy_key "$local_env" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/scc-backend-deploy.env"
          ssh -p "${{ secrets.VPS_PORT || 22 }}" -i ~/.ssh/scc_deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash -lc 'set -euo pipefail; deploy_env=/tmp/scc-backend-deploy.env; trap '\''rm -f \"\$deploy_env\"'\'' EXIT; chmod 600 \"\$deploy_env\"; set -a; source \"\$deploy_env\"; set +a; chmod +x /tmp/deploy-scc-backend.sh; /tmp/deploy-scc-backend.sh'"
